version: "3.9"

services:

  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    # GPU Nvidia : décommenter les deux lignes suivantes
    # deploy:
    #   resources: { reservations: { devices: [{ capabilities: [gpu] }] } }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      retries: 5

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama-data:/root/.ollama
    entrypoint: ["ollama", "pull", "${OLLAMA_MODEL:-llama3.1}"]
    restart: "no"

  chatbot-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports: ["8001:8001"]
    env_file: .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OBS_API_URL:     ${OBS_API_URL:-http://host.docker.internal:8000}
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      retries: 5

  chatbot-frontend:
    build:
      context: frontend
      dockerfile: Dockerfile.frontend
    ports: ["5173:80"]
    environment:
      VITE_WS_URL:  ws://localhost:8001/ws/chat
      VITE_API_URL: http://localhost:8001
    depends_on: [chatbot-backend]
    restart: unless-stopped

volumes:
  ollama-data:
