version: "3.9"

services:

  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    # GPU Nvidia : décommenter les deux lignes suivantes
    # deploy:
    #   resources: { reservations: { devices: [{ capabilities: [gpu] }] } }
    healthcheck:
      test: ["CMD-SHELL", "ollama list || true"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama-data:/root/.ollama
    entrypoint: ["ollama", "pull", "${OLLAMA_MODEL:-llama3.1}"]
    restart: "no"

  mock-obs:
    build: ./mock-obs
    ports: ["9000:9000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9000/health')\""]
      interval: 5s
      timeout: 3s
      retries: 5

  chatbot-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports: ["8001:8001"]
    env_file: .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OBS_API_URL: http://mock-obs:9000
      VICTORIAMETRICS_URL: http://mock-obs:9000
    depends_on:
      ollama:
        condition: service_healthy
      mock-obs:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      retries: 5

  chatbot-frontend:
    build:
      context: frontend
      dockerfile: Dockerfile.frontend
    ports: ["5174:80"]
    environment:
      VITE_WS_URL:  ws://localhost:8001/ws/chat
      VITE_API_URL: http://localhost:8001
    depends_on: [chatbot-backend]
    restart: unless-stopped

volumes:
  ollama-data:
