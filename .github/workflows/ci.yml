name: CI — obs-chatbot

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install ruff
      - run: ruff check backend/ teams_bot/ tests/
      - run: ruff format --check backend/ teams_bot/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install -e ".[dev]"
      - run: pytest tests/unit -v --cov=backend --cov-report=xml
        env:
          OBS_API_URL:       http://localhost:8000
          OLLAMA_BASE_URL:   http://localhost:11434
          OLLAMA_MODEL:      llama3.1
      - uses: codecov/codecov-action@v4
        with: { files: ./coverage.xml, fail_ci_if_error: false }

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: cd frontend && npm ci
      - run: cd frontend && npm run build
